    <style>
        :root {
            --primary-pink: #ff6b81;
            --dark-pink: #ff4757;
            --bg-color: #fff0f2;
            --text-color: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 129, 0.15);
            text-align: center;
            margin-top: 40px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--dark-pink);
            font-size: 2.3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-style: italic;
            color: #747d8c;
            margin-bottom: 25px;
        }

        .couple-photo {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
        }

        button:hover {
            background-color: var(--dark-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .display-area {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ffcbd2;
            border-radius: 15px;
            padding: 20px;
            background-color: #fffafb;
        }

        .message {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-color);
            animation: fadeIn 0.5s ease forwards;
        }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
