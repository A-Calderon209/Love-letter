<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Persona Favorita ❤️</title>
    <style>
        :root {
            --primary-pink: #ff6b81;
            --dark-pink: #ff4757;
            --bg-color: #fff0f2;
            --text-color: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 129, 0.15);
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            color: var(--dark-pink);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-style: italic;
            color: #747d8c;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
        }

        button:hover {
            background-color: var(--dark-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .display-area {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ffcbd2;
            border-radius: 15px;
            padding: 20px;
            background-color: #fffafb;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-color);
            animation: fadeIn 0.5s ease forwards;
        }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hola Hermosa!, Q tengas lindo dia! ❤️</h1>
        <p class="subtitle">Presiona los butones para algunas sorpresitas 💕.</p>

        <div class="button-group">
            <button onclick="showMessage('reason')">✨ Reason #1 Why I Love You</button>
            <button onclick="showMessage('memory')">📸 Un recuredo  Lindo </button>
            <button onclick="showMap()">📍 Donde Todo Empezo 🩷</button>
        </div>

        <div class="display-area" id="displayArea">
            <p class="message" style="color: #a4b0be;">Your message will appear here...</p>
        </div>
    </div>

    <script>
        const displayArea = document.getElementById('displayArea');

        function showMessage(type) {
            let content = '';
            
            if (type === 'reason') {
                content = `<p class="message"><strong>Reason #1:</strong> I love the way your eyes light up whenever you talk about the things you are genuinely passionate about. You inspire me daily!</p>`;
            } else if (type === 'memory') {
                content = `<p class="message"><strong>Our best memory:</strong> I still smile thinking about the time we got caught in the sudden downpour and ended up eating cold pizza under that tiny awning. I'd ruin any jacket for you.</p>`;
            }
            
            displayArea.innerHTML = content;
        }

        function showMap() {
            // HOW TO REMIX THE MAP: 
            // 1. Go to Google Maps -> Search your first date spot.
            // 2. Click "Share" -> Select the "Embed a map" tab.
            // 3. Copy the URL inside the `src="..."` attribute and replace the URL below.
            
            const mapHtml = `
                <div class="message" style="width: 100%;">
                    <p style="margin-top: 0; margin-bottom: 10px;"><strong>Our First Date Location:</strong></p>
                    <div class="map-container">
                        <iframe src="https://google.com" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            `;
            displayArea.innerHTML = mapHtml;
        }
    </script>

</body>
</html>
