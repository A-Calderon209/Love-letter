<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Persona Favorita ❤️</title>
    <style>
        :root {
            --primary-pink: #ff6b81;
            --dark-pink: #ff4757;
            --bg-color: #fff0f2;
            --text-color: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 129, 0.15);
            text-align: center;
            margin-top: 40px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--dark-pink);
            font-size: 2.3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-style: italic;
            color: #747d8c;
            margin-bottom: 25px;
        }

        /* Contenedor del Carrusel de Fotos */
        .slideshow-container {
            max-width: 100%;
            position: relative;
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            height: 350px;
        }

        .mySlides {
            display: none;
            width: 100%;
            height: 100%;
        }

        .mySlides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Flechas de navegación */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0,0,0,0.3);
            text-decoration: none;
        }

        .prev { left: 0; border-radius: 3px 0 0 3px; }
        .next { right: 0; border-radius: 3px 0 0 3px; }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
        }

        button:hover {
            background-color: var(--dark-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .display-area {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ffcbd2;
            border-radius: 15px;
            padding: 20px;
            background-color: #fffafb;
        }

        .message {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-color);
            animation: fadeIn 0.5s ease forwards;
        }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        // Lógica del carrusel automático
        let slideIndex = 0;
        showSlides();

        function plusSlides(n) {
            showSlidesManual(slideIndex += n);
        }

        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 4000); 
        }

        function showSlidesManual(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            if (n > slides.length) {slideIndex = 1}    
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slides[slideIndex-1].style.display = "block";  
        }
